<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="bgGradient512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d9561;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="80" fill="url(#bgGradient512)"/>
  
  <!-- Icono de comida/banco alimentario -->
  <g transform="translate(256, 256)">
    <!-- Canasta/Caja principal -->
    <rect x="-120" y="-90" width="240" height="180" rx="12" fill="white" opacity="0.95" filter="url(#shadow)"/>
    
    <!-- Corazón grande (símbolo de ayuda) -->
    <path d="M 0,-130 C -15,-145 -45,-145 -60,-120 C -75,-95 -60,-70 0,-35 C 60,-70 75,-95 60,-120 C 45,-145 15,-145 0,-130 Z" 
          fill="#ffffff" opacity="0.98" filter="url(#shadow)"/>
    
    <!-- Líneas decorativas (representando productos apilados) -->
    <line x1="-80" y1="-50" x2="-80" y2="40" stroke="white" stroke-width="8" opacity="0.8"/>
    <line x1="-40" y1="-50" x2="-40" y2="40" stroke="white" stroke-width="8" opacity="0.8"/>
    <line x1="0" y1="-50" x2="0" y2="40" stroke="white" stroke-width="8" opacity="0.8"/>
    <line x1="40" y1="-50" x2="40" y2="40" stroke="white" stroke-width="8" opacity="0.8"/>
    <line x1="80" y1="-50" x2="80" y2="40" stroke="white" stroke-width="8" opacity="0.8"/>
    
    <!-- Detalle de compartimiento -->
    <rect x="-110" y="-80" width="220" height="40" rx="8" fill="none" stroke="white" stroke-width="4" opacity="0.6"/>
    
    <!-- Texto BA (Banque Alimentaire) -->
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="60" font-weight="bold" 
          fill="white" text-anchor="middle" filter="url(#shadow)">BA</text>
  </g>
  
  <!-- Borde decorativo opcional -->
  <rect x="8" y="8" width="496" height="496" rx="76" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
</svg>
